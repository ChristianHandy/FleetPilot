{% extends "base.html" %}
{% block title %}Edit {{ dev.name }} — Commander Pro — FleetPilot{% endblock %}
{% block content %}
<div class="page-header">
  <h1 class="page-title">&#x2699;&#xFE0F; Edit: {{ dev.name }}</h1>
  <p class="page-subtitle">Update connection settings for this Commander Pro device</p>
</div>

<div class="card" style="max-width:680px;">
  <div class="card-header"><span class="card-title">Device Configuration</span></div>
  <form method="POST" action="/commander/{{ dev.id }}/edit" style="padding:1.5rem;">

    <div class="form-group">
      <label class="form-label">Device Name</label>
      <input type="text" name="name" class="form-control" value="{{ dev.name }}" required>
    </div>

    <div style="display:grid;grid-template-columns:1fr auto;gap:1rem;">
      <div class="form-group">
        <label class="form-label">Remote Host</label>
        <input type="text" name="host" class="form-control" value="{{ dev.host }}" required>
      </div>
      <div class="form-group">
        <label class="form-label">SSH Port</label>
        <input type="number" name="port" class="form-control" value="{{ dev.port }}" min="1" max="65535" style="width:90px;">
      </div>
    </div>

    <div style="display:grid;grid-template-columns:1fr 1fr;gap:1rem;">
      <div class="form-group">
        <label class="form-label">SSH Username</label>
        <input type="text" name="username" class="form-control" value="{{ dev.username }}">
      </div>
      <div class="form-group">
        <label class="form-label">SSH Password</label>
        <input type="password" name="password" class="form-control" placeholder="Leave blank to keep current">
      </div>
    </div>

    <div class="form-group">
      <label class="form-label">SSH Key Path</label>
      <input type="text" name="ssh_key" class="form-control" value="{{ dev.ssh_key }}" placeholder="/opt/fleetpilot/.ssh/id_rsa">
    </div>

    <div class="form-group">
      <label class="form-label">liquidctl Match String</label>
      <input type="text" name="match_str" class="form-control" value="{{ dev.match_str }}">
    </div>

    <div class="form-group">
      <label class="form-label">
        <input type="checkbox" name="use_direct" value="1" {% if dev.use_direct %}checked{% endif %} style="margin-right:.4rem;">
        Force direct USB access (<code>--direct-access</code>)
      </label>
    </div>

    <div class="form-group">
      <label class="form-label">
        <input type="checkbox" name="enabled" value="1" {% if dev.enabled %}checked{% endif %} style="margin-right:.4rem;">
        Enabled (include in polling)
      </label>
    </div>

    <div class="form-group">
      <label class="form-label">Notes</label>
      <textarea name="notes" class="form-control" rows="2">{{ dev.notes }}</textarea>
    </div>

    <div style="display:flex;gap:.75rem;margin-top:1.5rem;">
      <button type="submit" class="btn btn-primary">Save Changes</button>
      <a href="/commander/{{ dev.id }}" class="btn btn-secondary">Cancel</a>
      <form method="POST" action="/commander/{{ dev.id }}/delete" style="margin:0;"
            onsubmit="return confirm('Delete {{ dev.name }}? This cannot be undone.')">
        <button type="submit" class="btn btn-danger">Delete</button>
      </form>
    </div>
  </form>
</div>
{% endblock %}
