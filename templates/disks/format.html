{% extends 'disks/base.html' %}{% block title %}Format{% endblock %}
{% block content %}
<h1>Format /dev/{{ device }}</h1>
<p><a href="{{ url_for('disks_index') }}" class="btn btn-secondary">← Back to Disk Overview</a></p>
<form method="post" class="row g-3">
    <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
  <div class="col-auto">
    <select name="fs" class="form-select">
      <option value="ext4">ext4</option>
      <option value="xfs">xfs</option>
      <option value="fat32">fat32</option>
    </select>
  </div>
  <div class="col-auto"><button class="btn btn-danger">{{ _('Start') }}</button></div>
</form>
{% endblock %}
