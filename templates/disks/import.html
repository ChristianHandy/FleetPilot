{% extends 'disks/base.html' %}{% block title %}SMART Import{% endblock %}
{% block content %}
<h1>{{ _('Import SMART Report') }}</h1>
<p><a href="{{ url_for('disks_index') }}" class="btn btn-secondary">{{ _('← Back to Disk Overview') }}</a></p>
<form method="post" enctype="multipart/form-data">
    <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
  <input class="form-control mb-3" type="file" name="file" accept=".txt,.log">
  <button class="btn btn-primary">{{ _('Upload') }}</button>
</form>
{% endblock %}
